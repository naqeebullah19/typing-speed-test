<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    /* Default to the Gruvbox Light Theme Soft Green */
    path {
      fill: #7DAEA3;
      stroke: #7DAEA3;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    /* Automatically switch to Serika Dark Gold if the user's OS is in Dark Mode */
